services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: foyer-postgres
    environment:
      POSTGRES_USER: foyer
      POSTGRES_PASSWORD: foyer_dev
      POSTGRES_DB: foyer
    ports:
      - "5432:5432"
    volumes:
      - foyer-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foyer -d foyer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: foyer-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - foyer-redis:/data

volumes:
  foyer-pg:
  foyer-redis:
