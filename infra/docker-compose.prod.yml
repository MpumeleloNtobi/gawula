services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foyer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-foyer}
    volumes:
      - foyer-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foyer} -d ${POSTGRES_DB:-foyer}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - foyer-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-foyer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foyer}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      PAYMENTS_PROVIDER: ${PAYMENTS_PROVIDER:-stub}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SHOW_QA_CREDENTIALS: ${NEXT_PUBLIC_SHOW_QA_CREDENTIALS:-false}
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  foyer-pg:
  foyer-redis:
